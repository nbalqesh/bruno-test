info:
  name: GetAllPosts
  type: http
  seq: 1

http:
  method: GET
  url: https://jsonplaceholder.typicode.com/posts
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status should be 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Should return 100 posts", function() {
          expect(res.body.length).to.equal(100);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
